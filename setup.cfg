[flake8]
exclude = .venv,.git,.tox,docs,venv,bin,lib,deps,build
doctests = True
# To work with Black
max-line-length = 88
# E501: line too long
# W503: Line break occurred before a binary operator
# E203: Whitespace before ':'
# D202 No blank lines allowed after function docstring
# W504 line break after binary operator
ignore =
    E501,
    W503,
    E203,
    D202,
    W504

[isort]
# https://github.com/timothycrosley/isort
# https://github.com/timothycrosley/isort/wiki/isort-Settings
# splits long import on multiple lines indented by 4 spaces
multi_line_output = 3
profile=black
force_single_line=True
include_trailing_comma=True
force_grid_wrap=0
use_parentheses=True
line_length=88
indent = "    "
# by default isort don't check module indexes
not_skip = __init__.py
# will group `import x` and `from x import` of the same module.
force_sort_within_sections = true
known_first_party = custom_components.tplink_deco
combine_as_imports = true

[pylint]
disable = broad-except,missing-class-docstring,missing-function-docstring

[tool:pytest]
asyncio_mode = auto
pythonpath = .
testpaths = tests
addopts = -ra --cov=custom_components/tplink_deco --cov-report=term-missing:skip-covered
console_output_style = count

[coverage:run]
branch = False
omit =
    custom_components/tplink_deco/__init__.py
    custom_components/tplink_deco/binary_sensor.py
    custom_components/tplink_deco/device.py
    custom_components/tplink_deco/device_tracker.py
    custom_components/tplink_deco/select.py
    custom_components/tplink_deco/sensor.py
    custom_components/tplink_deco/switch.py

[coverage:report]
show_missing = true
fail_under = 75
precision = 1
skip_covered = true
